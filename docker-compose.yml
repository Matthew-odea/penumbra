# =============================================================================
# Penumbra — Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
# =============================================================================

services:
  # ── Penumbra (Pipeline + API + Dashboard in one container) ───────────────
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - penumbra-data:/app/data   # DuckDB persistence
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  penumbra-data:
