# =============================================================================
# Penumbra — Docker Compose (Local Development)
# =============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
# =============================================================================

services:
  # ── Penumbra (Pipeline + API in one process) ─────────────────────────────
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # DuckDB file persistence
      - ./sentinel:/app/sentinel  # Hot-reload source code (dev only)
    restart: unless-stopped
    # Runs: Ingester → Scanner → Judge + FastAPI on :8000
    command: python -m sentinel --with-api

volumes:
  data:
