# =============================================================================
# Penumbra — Docker Compose (Local Development)
# =============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
# =============================================================================

services:
  # ── Python Engine (Ingester + Scanner + Judge) ────────────────────────────
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data          # DuckDB file persistence
      - ./sentinel:/app/sentinel  # Hot-reload source code
    depends_on: []
    restart: unless-stopped
    command: python -m sentinel

  # ── FastAPI Gateway ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sentinel:/app/sentinel
    command: uvicorn sentinel.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Next.js Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
